<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nerd Itadori — Roblox Animation Commissions">
    <title>Nerd Itadori • Animation Commissions</title>
  
    <script src="https://cdn.tailwindcss.com"></script>
  
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
      
        :root {
            --accent: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.085);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
      
        * {
            transition: all 280ms cubic-bezier(0.4, 0, 0.22, 1);
        }
      
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(160deg, #0f172a, #1e2937, #172554);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .title-font {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -0.03em;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
        }

        .card {
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 26px;
        }

        .video-embed {
            aspect-ratio: 16 / 9;
            border-radius: 22px;
            overflow: hidden;
        }

        .pill {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <main class="max-w-6xl mx-auto px-6 py-8">
        
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <img src="emojisorrindoedandolike.webp" alt="Nerd Itadori" 
                     class="w-11 h-11 rounded-2xl object-cover ring-2 ring-violet-400">
                <h1 class="title-font text-4xl">Nerd Itadori</h1>
            </div>
            <div class="flex items-center gap-4">
                <select id="language-dropdown" onchange="setLanguage(this.value)" 
                        class="glass bg-transparent border border-white/30 rounded-2xl px-5 py-3 text-sm">
                    <option value="en">🇬🇧 English</option>
                    <option value="pt">🇧🇷 Português</option>
                </select>
                <button onclick="toggleTheme()" class="glass px-6 py-3 rounded-2xl">🌙 Toggle Theme</button>
            </div>
        </div>

        <!-- Content will be injected here by JS -->
        <div id="main-content"></div>
    </main>

    <script>
        // ==================== SITE DATA ====================
        const siteData = {
            en: {
                badge: "Animation Commissions — Open Now",
                headerSubtitle: "Animator • Clean and smooth animations for roblox games, R6 R15 and Custom rigs.",
                meta: { experience: "1+ year experience", payments: "PayPal & Robux accepted", open: "Open for commissions" },
                contact: { discordLabel: "Discord:", include: "Include in your message: project type, rig (R6/R15/custom), references." },
                // ... (add the rest of your sections: about, whatYouGet, pricing, etc. if needed)
            },
            pt: {
                // Portuguese version...
            }
        };

        // ==================== RENDER FUNCTIONS ====================
        function renderAllContent(lang) {
            const data = siteData[lang] || siteData.en;
            const container = document.getElementById('main-content');
            
            container.innerHTML = `
                <div class="glass rounded-3xl p-12 mb-12 text-center">
                    <h2 class="text-6xl font-bold title-font mb-6">${data.headerSubtitle}</h2>
                    <p class="text-2xl text-violet-200">${data.badge}</p>
                </div>
                <p class="text-center text-violet-300 mt-12">Full portfolio loading... (more sections coming soon)</p>
            `;
        }

        function setLanguage(lang) {
            localStorage.setItem('preferredLang', lang);
            renderAllContent(lang);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            alert("Theme toggled! (Full dark mode coming soon)");
        }

        // ==================== INIT ====================
        window.onload = () => {
            const savedLang = localStorage.getItem('preferredLang') || 'en';
            document.getElementById('language-dropdown').value = savedLang;
            renderAllContent(savedLang);
            console.log('%c✅ Site loaded successfully!', 'color:#a855f7; font-size:16px');
        };
    </script>
</body>
</html>
