<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nerd Itadori — Roblox Animation Commissions | Smooth, game-ready animations for R6, R15 & custom rigs. PayPal & Robux accepted.">
    <title>Nerd Itadori • Animation Commissions</title>
  
    <script src="https://cdn.tailwindcss.com"></script>
  
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
      
        :root {
            --accent: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.085);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-dark-bg: rgba(15, 23, 42, 0.88);
            --glass-dark-border: rgba(167, 139, 250, 0.22);
            --card-bg: rgba(255, 255, 255, 0.055);
            --shadow-soft: 0 12px 45px -18px rgba(168, 85, 247, 0.22);
            --shadow-glow: 0 0 40px -12px rgba(168, 85, 247, 0.35);
        }
      
        * { transition: all 280ms cubic-bezier(0.4, 0, 0.22, 1); }
      
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(160deg, #0f172a, #1e2937, #172554);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .title-font {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -0.028em;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(185%);
            border: 1px solid var(--glass-border);
        }

        .dark .glass { background: var(--glass-dark-bg); border-color: var(--glass-dark-border); }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 26px;
        }

        .video-embed {
            aspect-ratio: 16 / 9;
            border-radius: 22px;
            overflow: hidden;
        }

        .pill {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .video-card.variant-toon .video-embed {
            border: 3px solid #1e2937;
            background: #f8f1e3;
            filter: contrast(1.15) brightness(1.1) saturate(1.08);
        }
    </style>
</head>
<body>
    <!-- LANGUAGE MODAL -->
    <div id="language-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] hidden">
        <div class="glass max-w-md w-full mx-4 rounded-3xl p-10 text-center">
            <h2 id="modal-title" class="text-3xl font-semibold mb-2 title-font"></h2>
            <p id="modal-subtitle" class="text-violet-200 mb-8"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setLanguage('en')" class="glass hover:scale-105 py-6 px-4 rounded-2xl font-medium text-lg">🇬🇧 English</button>
                <button onclick="setLanguage('pt')" class="glass hover:scale-105 py-6 px-4 rounded-2xl font-medium text-lg">🇧🇷 Português</button>
            </div>
            <button onclick="closeModal()" class="mt-8 text-sm text-violet-300 hover:text-white">Skip for now →</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <img src="emojisorrindoedandolike.webp" alt="Nerd Itadori" class="w-10 h-10 rounded-2xl object-cover ring-2 ring-violet-400">
                <h1 class="title-font text-4xl">Nerd Itadori</h1>
            </div>
            <div class="flex items-center gap-4">
                <select id="language-dropdown" onchange="setLanguage(this.value)" class="glass bg-transparent border border-white/30 rounded-2xl px-5 py-3 text-sm">
                    <option value="en">🇬🇧 English</option>
                    <option value="pt">🇧🇷 Português (BR)</option>
                </select>
                <button onclick="toggleTheme()" id="theme-toggle" class="glass px-6 py-3 rounded-2xl">☀️ Toggle Theme</button>
            </div>
        </div>

        <div id="main-content"></div>
    </main>

    <script>
        const siteData = {
            en: {
                modal: { title: "Select your language", subtitle: "Choose how you want to view the site." },
                badge: "Animation Commissions — Open Now",
                headerSubtitle: "Animator • Clean and smooth animations for roblox games, R6 R15 and Custom rigs.",
                meta: { experience: "1+ year experience", payments: "PayPal & Robux accepted", open: "Open for commissions" },
                contact: { discordLabel: "Discord:", include: "Include project type, rig (R6/R15/custom), references." },
                about: { title: "About me", text1: "Hi! I’m Nerd Itadori, an animator with over 1 year of experience.", text2: "Open for commissions via PayPal or Robux." },
                whatYouGet: {
                    title: "What you get",
                    items: ["Smooth, polished animations ready for your game.","Support for R6, R15, or custom rigs.","Clean timing, transitions, and poses.","Fast delivery and clear communication.","One free revision."],
                    pills: ["Game-ready", "Combat & movement", "Cutscenes"]
                },
                pricing: {
                    title: "Pricing",
                    note: "Prices may vary depending on complexity.",
                    usd: { title: "USD Prices", rows: [{type:"Intermediate",price:"$10 – $15"},{type:"Complex",price:"$20 – $25"},{type:"Cutscene",price:"+ $5 – $8"}] },
                    robux: { title: "Robux Prices", rows: [{type:"Intermediate",price:"R800 – R1000"},{type:"Complex",price:"R1800 – R2000"},{type:"Cutscene",price:"+ R500 – R750"}] }
                },
                contactSection: { title: "Contact & workflow", items: ["Discord — <strong>nerditadori</strong>"] },
                showcase: {
                    title: "Animation showcase",
                    videos: [
                        {title:"Light sabers fight", desc:"A fight of light sabers masters", youtubeId:"KlEca4onh-s", variant:"variant-2"},
                        {title:"Head Cracking Dropkick", desc:"A dropkick so strong it shatters the screen", youtubeId:"6c215WjpG08", variant:"variant-3"},
                        {title:"Fatal Stab", desc:"A fatal stabbing animation", youtubeId:"PLUT0NIdFDE", variant:"variant-1"},
                        {title:"Glad he didn't overreact...", desc:"ehhhh, idk what to say", youtubeId:"Aod_D1om0vM", variant:"variant-2"},
                        {title:"Toon Force Animation", desc:"Cartoon-style attack", youtubeId:"0vf2mWYti6U", variant:"variant-toon"},
                        {title:"Backrooms No-clip", desc:"Backrooms no-clipping animation", youtubeId:"efjryhAPIvs", variant:"variant-toon"}
                    ]
                },
                terms: { title: "Terms of service", items: ["Do not resell animations.", "Credit appreciated."] }
            },
            pt: { /* Add your Portuguese data here if needed */ }
        };

        function renderAllContent(lang) {
            const data = siteData[lang] || siteData.en;
            const container = document.getElementById('main-content');
            
            let videosHTML = data.showcase.videos.map(v => `
                <div class="card video-card ${v.variant} p-4">
                    <div class="video-embed">
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${v.youtubeId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="mt-4">
                        <div class="font-semibold text-xl">${v.title}</div>
                        <div class="text-violet-200 text-sm">${v.desc}</div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="glass rounded-3xl p-12 mb-16 text-center">
                    <h2 class="text-5xl md:text-6xl title-font">${data.headerSubtitle}</h2>
                </div>
                <div class="mb-16">
                    <h2 class="text-4xl font-semibold mb-6">${data.showcase.title}</h2>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${videosHTML}
                    </div>
                </div>
            `;
        }

        function setLanguage(lang) {
            renderAllContent(lang);
            document.getElementById('language-dropdown').value = lang;
            localStorage.setItem('preferredLang', lang);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';
        }

        function closeModal() {
            document.getElementById('language-modal').classList.add('hidden');
        }

        window.onload = () => {
            const lang = localStorage.getItem('preferredLang') || 'en';
            document.getElementById('language-dropdown').value = lang;
            renderAllContent(lang);
            
            if (!localStorage.getItem('preferredLang')) {
                document.getElementById('language-modal').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
