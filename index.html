        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
       
        :root {
            --accent: #a855f7;
            --accent-gradient: linear-gradient(135deg, #a855f7, #c026d3, #db2777);
            --glass-bg: rgba(255, 255, 255, 0.085);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-dark-bg: rgba(15, 23, 42, 0.88);
            --glass-dark-border: rgba(167, 139, 250, 0.22);
            --card-bg: rgba(255, 255, 255, 0.055);
            --shadow-soft: 0 12px 45px -18px rgba(168, 85, 247, 0.22);
            --shadow-glow: 0 0 40px -12px rgba(168, 85, 247, 0.35);
        }
       
        * {
            transition: color 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        background-color 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        border-color 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        box-shadow 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        transform 280ms cubic-bezier(0.4, 0, 0.22, 1);
        }
       
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            
            /* Professional deep blue background */
            background: 
                radial-gradient(circle at 25% 25%, rgba(59, 130, 246, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 75% 80%, rgba(96, 165, 250, 0.08) 0%, transparent 60%),
                linear-gradient(160deg, #0f172a, #1e2937, #172554);
            background-size: 300% 300%, 250% 250%, 100% 100%;
            animation: gentleShift 40s ease infinite;
            
            /* Very subtle depth */
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 45%, rgba(15, 23, 42, 0.75) 100%);
            opacity: 0.65;
        }
        
        /* Gentle background movement */
        @keyframes gentleShift {
            0%   { background-position: 0% 50%, 100% 50%, 0% 0%; }
            50%  { background-position: 100% 50%, 0% 50%, 100% 100%; }
            100% { background-position: 0% 50%, 100% 50%, 0% 0%; }
        }
        
        /* Minimal, professional text enhancement */
        body * {
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }
        
        /* Clean title treatment - no wild glow */
        .title-font {
            letter-spacing: -0.038em;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 6px rgba(59, 130, 246, 0.25));
        }
       
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -0.028em;
        }
       
        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(185%);
            -webkit-backdrop-filter: blur(28px) saturate(185%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
        }
       
        .dark .glass {
            background: var(--glass-dark-bg);
            border: 1px solid var(--glass-dark-border);
        }
       
        /* Base Card */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 26px;
            box-shadow: 0 10px 38px -15px rgba(0, 0, 0, 0.35);
        }
       
        .dark .card {
            background: rgba(15, 23, 42, 0.68);
            border: 1px solid rgba(167, 139, 250, 0.14);
        }
       
        /* Video Embeds - Cinematic base */
        .video-embed {
            aspect-ratio: 16 / 9;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
       
        /* ==================== VIDEO CARD VARIANTS (fully individual styles) ==================== */
        .video-card {
            overflow: hidden;
        }
       
        .video-card.variant-1 .video-embed { box-shadow: var(--shadow-glow), 0 28px 60px -15px rgb(0 0 0 / 0.45); }
        .video-card.variant-1 .video-embed:hover { transform: scale(1.025) translateY(-6px); box-shadow: 0 0 50px -10px rgba(168, 85, 247, 0.55); }
       
        .video-card.variant-2 .video-embed { box-shadow: 0 0 35px -10px rgba(236, 72, 153, 0.4), 0 25px 55px -12px rgb(0 0 0 / 0.5); border-color: rgba(236, 72, 153, 0.3); }
        .video-card.variant-2 .video-embed:hover { transform: scale(1.03) rotate(1deg); box-shadow: 0 0 55px -8px rgba(236, 72, 153, 0.6); }
       
        .video-card.variant-3 .video-embed { box-shadow: 0 0 45px -15px rgba(59, 130, 246, 0.35), inset 0 2px 0 0 rgba(255,255,255,0.1); }
        .video-card.variant-3 .video-embed:hover { transform: scale(1.02) translateY(-4px); box-shadow: 0 0 60px -10px rgba(59, 130, 246, 0.5); }
       
        .video-card.variant-4 .video-embed { box-shadow: 0 0 50px -15px rgba(234, 179, 8, 0.4); }
        .video-card.variant-4 .video-embed:hover { transform: scale(1.04) translateY(-8px); box-shadow: 0 0 65px -10px rgba(234, 179, 8, 0.6); }

            box-shadow:
                0 0 0 14px #fefce8,              /* paper edge layer */

                4px 6px 0 5px #eab308,           /* bright yellow sketch layer */
                0 30px 60px -12px rgb(0 0 0 / 0.65),

                inset 0 -4px 8px -2px rgba(0,0,0,0.15);        /* subtle paper shadow */
            filter: contrast(1.15) brightness(1.1) saturate(1.08);

                        <thead><tr class="border-b border-white/10"><th class="pb-4 font-medium text-violet-200">Type</th><th class="pb-4 font-medium text-violet-200 text-right">Price</th></tr></thead>
                        <tbody class="text-lg">
                            ${data.robux.rows.map(r => `<tr class="border-b border-white/10"><td>${r.type}</td><td class="text-right">${r.price}</td></tr>`).join('')}
                        </tbody>
                    </table>
                    <div class="mt-8 flex items-center gap-2 text-sm"><span class="text-2xl">🪙</span><span>Robux</span></div>
                </div>`;
            
            container.innerHTML = usdHTML + robuxHTML;
        }

        function renderContactList(lang) {
            const data = siteData[lang].contactSection;
            const list = document.getElementById('contact-list');
            list.innerHTML = data.items.map(item => `<li>${item}</li>`).join('');
        }

        function renderTerms(lang) {
            const data = siteData[lang].terms;
            const list = document.getElementById('terms-list');
            list.innerHTML = data.items.map(item => `<li>${item}</li>`).join('');
        }

        function renderVideoCards(lang) {
            const data = siteData[lang].showcase;
            const container = document.getElementById('video-grid');
            container.innerHTML = '';

            data.videos.forEach(video => {
                const cardHTML = `
                    <div class="card video-card ${video.variant} rounded-3xl overflow-hidden group">
                        <div class="video-embed">
                            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${video.youtubeId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="p-6">
                            <div class="font-semibold text-xl title-font">${video.title}</div>
                            <div class="text-violet-200 mt-1">${video.desc}</div>
                        </div>
                    </div>`;
                container.innerHTML += cardHTML;
            });
        }

        function renderAllContent(lang) {
            const data = siteData[lang];

            // Simple text elements
            document.getElementById('modal-title').textContent = data.modal.title;
            document.getElementById('modal-subtitle').textContent = data.modal.subtitle;
            document.getElementById('badge-commissions').textContent = data.badge;
            document.getElementById('header-subtitle').innerHTML = data.headerSubtitle;
            document.getElementById('meta-experience').textContent = data.meta.experience;
            document.getElementById('meta-payments').textContent = data.meta.payments;
            document.getElementById('meta-open').textContent = data.meta.open;
            document.getElementById('contact-discord-label').textContent = data.contact.discordLabel;
            document.getElementById('contact-include').textContent = data.contact.include;
            document.getElementById('pricing-title').textContent = data.pricing.title;
            document.getElementById('pricing-note').textContent = data.pricing.note;
            document.getElementById('contact-title').textContent = data.contactSection.title;
            document.getElementById('showcase-title').textContent = data.showcase.title;
            document.getElementById('terms-title').textContent = data.terms.title;

            // Complex sections
            renderAbout(lang);
            renderWhatYouGet(lang);
            renderPricing(lang);
            renderContactList(lang);
            renderTerms(lang);
            renderVideoCards(lang);
        }

        // ==================== LANGUAGE & THEME ====================
        function setLanguage(lang) {
            if (!siteData[lang]) return;
            renderAllContent(lang);
            document.getElementById('language-dropdown').value = lang;
            closeModal();
            localStorage.setItem('preferredLang', lang);
        }

        function closeModal() {
            document.getElementById('language-modal').classList.add('hidden');
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
            document.getElementById('theme-text').textContent = isDark ? 'Light Mode' : 'Dark Mode';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // ==================== INIT ====================
        window.onload = () => {
            const savedLang = localStorage.getItem('preferredLang') || 'en';
            document.getElementById('language-dropdown').value = savedLang;
            renderAllContent(savedLang);

            if (!localStorage.getItem('preferredLang')) {
                document.getElementById('language-modal').classList.remove('hidden');
            }

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').textContent = '🌙';
                document.getElementById('theme-text').textContent = 'Light Mode';
            }

            console.log('%c✅ Nerd Itadori Animation Commissions site loaded successfully!', 'color:#a855f7; font-weight:bold');
        };
    </script>
</body>
</html>
