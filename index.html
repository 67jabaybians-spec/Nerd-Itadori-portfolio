<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nerd Itadori — Roblox Animation Commissions | Smooth, game-ready animations for R6, R15 & custom rigs. PayPal & Robux accepted.">
    <title>Nerd Itadori • Animation Commissions</title>
  
    <script src="https://cdn.tailwindcss.com"></script>
  
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
      
        :root {
            --accent: #a855f7;
            --accent-gradient: linear-gradient(135deg, #a855f7, #c026d3, #db2777);
            --glass-bg: rgba(255, 255, 255, 0.085);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-dark-bg: rgba(15, 23, 42, 0.88);
            --glass-dark-border: rgba(167, 139, 250, 0.22);
            --card-bg: rgba(255, 255, 255, 0.055);
            --shadow-soft: 0 12px 45px -18px rgba(168, 85, 247, 0.22);
            --shadow-glow: 0 0 40px -12px rgba(168, 85, 247, 0.35);
        }
      
        * {
            transition: color 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        background-color 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        border-color 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        box-shadow 280ms cubic-bezier(0.4, 0, 0.22, 1),
                        transform 280ms cubic-bezier(0.4, 0, 0.22, 1);
        }
      
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
           
            background:
                radial-gradient(circle at 25% 25%, rgba(59, 130, 246, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 75% 80%, rgba(96, 165, 250, 0.08) 0%, transparent 60%),
                linear-gradient(160deg, #0f172a, #1e2937, #172554);
            background-size: 300% 300%, 250% 250%, 100% 100%;
            animation: gentleShift 40s ease infinite;
           
            position: relative;
            overflow-x: hidden;
        }
       
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 45%, rgba(15, 23, 42, 0.75) 100%);
            opacity: 0.65;
        }
       
        @keyframes gentleShift {
            0% { background-position: 0% 50%, 100% 50%, 0% 0%; }
            50% { background-position: 100% 50%, 0% 50%, 100% 100%; }
            100% { background-position: 0% 50%, 100% 50%, 0% 0%; }
        }
       
        body * {
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }
       
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -0.028em;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 6px rgba(59, 130, 246, 0.25));
        }
      
        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(185%);
            -webkit-backdrop-filter: blur(28px) saturate(185%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
        }
      
        .dark .glass {
            background: var(--glass-dark-bg);
            border: 1px solid var(--glass-dark-border);
        }
      
        /* Base Card */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 26px;
            box-shadow: 0 10px 38px -15px rgba(0, 0, 0, 0.35);
        }
      
        .dark .card {
            background: rgba(15, 23, 42, 0.68);
            border: 1px solid rgba(167, 139, 250, 0.14);
        }
      
        /* Video Embeds */
        .video-embed {
            aspect-ratio: 16 / 9;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
      
        /* Video Card Variants */
        .video-card {
            overflow: hidden;
        }
      
        .video-card.variant-1 .video-embed { box-shadow: var(--shadow-glow), 0 28px 60px -15px rgb(0 0 0 / 0.45); }
        .video-card.variant-1 .video-embed:hover { transform: scale(1.025) translateY(-6px); box-shadow: 0 0 50px -10px rgba(168, 85, 247, 0.55); }
      
        .video-card.variant-2 .video-embed { box-shadow: 0 0 35px -10px rgba(236, 72, 153, 0.4), 0 25px 55px -12px rgb(0 0 0 / 0.5); border-color: rgba(236, 72, 153, 0.3); }
        .video-card.variant-2 .video-embed:hover { transform: scale(1.03) rotate(1deg); box-shadow: 0 0 55px -8px rgba(236, 72, 153, 0.6); }
      
        .video-card.variant-3 .video-embed { box-shadow: 0 0 45px -15px rgba(59, 130, 246, 0.35), inset 0 2px 0 0 rgba(255,255,255,0.1); }
        .video-card.variant-3 .video-embed:hover { transform: scale(1.02) translateY(-4px); box-shadow: 0 0 60px -10px rgba(59, 130, 246, 0.5); }
      
        .video-card.variant-4 .video-embed { box-shadow: 0 0 50px -15px rgba(234, 179, 8, 0.4); }
        .video-card.variant-4 .video-embed:hover { transform: scale(1.04) translateY(-8px); box-shadow: 0 0 65px -10px rgba(234, 179, 8, 0.6); }
      
        .video-card.variant-5 .video-embed { box-shadow: 0 0 40px -12px rgba(16, 185, 129, 0.35); }
        .video-card.variant-5 .video-embed:hover { transform: scale(1.025) translateY(-5px); box-shadow: 0 0 55px -10px rgba(16, 185, 129, 0.55); }
      
        /* Toon Force Variant */
        .video-card.variant-toon .video-embed {
            border: 3px solid #1e2937;
            border-radius: 14px;
            background: #f8f1e3;
            filter: contrast(1.15) brightness(1.1) saturate(1.08);
        }
      
        /* Pill */
        .pill {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }
      
        /* Discord Button */
        .btn-discord {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 9999px;
            background: linear-gradient(135deg, #5865F2, #4752C4);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 20px -6px rgba(88, 101, 242, 0.5);
            text-decoration: none;
            letter-spacing: -0.01em;
            margin-top: 16px;
        }
       
        .btn-discord:hover {
            background: linear-gradient(135deg, #4752C4, #3b45a0);
            transform: translateY(-3px);
            box-shadow: 0 12px 28px -6px rgba(88, 101, 242, 0.65);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-violet-950 text-white min-h-screen">
    <!-- LANGUAGE MODAL -->
    <div id="language-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] hidden">
        <div class="glass max-w-md w-full mx-4 rounded-3xl p-10 text-center">
            <h2 id="modal-title" class="text-3xl font-semibold mb-2 title-font"></h2>
            <p id="modal-subtitle" class="text-violet-200 mb-8"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setLanguage('en')" class="lang-btn glass hover:scale-105 py-6 px-4 rounded-2xl font-medium text-lg">🇬🇧 English</button>
                <button onclick="setLanguage('pt')" class="lang-btn glass hover:scale-105 py-6 px-4 rounded-2xl font-medium text-lg">🇧🇷 Português</button>
            </div>
            <button onclick="closeModal()" class="mt-8 text-sm text-violet-300 hover:text-white">Skip for now →</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- HEADER BAR -->
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img src="emojisorrindoedandolike.webp"
                         alt="Nerd Itadori"
                         class="w-10 h-10 rounded-2xl object-cover ring-2 ring-violet-400/70 ring-offset-2 ring-offset-slate-950 shadow-xl hover:scale-110 transition-transform">
                    <div class="absolute -inset-1 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-3xl blur-xl opacity-30 -z-10"></div>
                </div>
                <h1 class="title-font text-4xl tracking-tighter">Nerd Itadori</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <select id="language-dropdown" onchange="setLanguage(this.value)"
                        class="glass bg-transparent border border-white/30 text-white rounded-2xl px-5 py-3 text-sm font-medium focus:outline-none">
                    <option value="en">🇬🇧 English</option>
                    <option value="pt">🇧🇷 Português (BR)</option>
                </select>
                <button onclick="toggleTheme()" id="theme-toggle"
                        class="glass flex items-center gap-3 px-6 py-3 rounded-2xl hover:scale-105 font-medium">
                    <span id="theme-icon">☀️</span>
                    <span id="theme-text">Toggle Theme</span>
                </button>
            </div>
        </div>

        <!-- HERO -->
        <div class="glass rounded-3xl p-10 md:p-14 mb-16">
            <div class="flex flex-col md:flex-row justify-between items-start gap-8">
                <div class="flex-1">
                    <div class="inline-flex items-center gap-2 bg-white/10 text-white text-sm font-medium px-5 h-9 rounded-3xl mb-6">
                        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                        <span id="badge-commissions"></span>
                    </div>
                    <h2 id="header-subtitle" class="text-5xl md:text-6xl leading-none font-semibold title-font tracking-tighter mb-8"></h2>
                    <div class="flex flex-wrap gap-3">
                        <span id="meta-experience" class="glass px-5 py-2 rounded-3xl text-sm"></span>
                        <span id="meta-payments" class="glass px-5 py-2 rounded-3xl text-sm"></span>
                        <span id="meta-open" class="glass px-5 py-2 rounded-3xl text-sm bg-emerald-400/20 text-emerald-300"></span>
                    </div>
                </div>
                <div class="text-right md:text-left max-w-xs">
                    <p id="contact-discord-label" class="text-violet-200 text-lg mb-3"></p>
                    <strong class="text-4xl title-font">nerditadori</strong>
                    <p id="contact-include" class="text-sm mt-6 text-violet-200"></p>
                </div>
            </div>
        </div>

        <!-- ABOUT + WHAT YOU GET -->
        <div class="grid md:grid-cols-2 gap-8 mb-16">
            <div id="about-card" class="card rounded-3xl p-8"></div>
            <div id="what-card" class="card rounded-3xl p-8"></div>
        </div>

        <!-- PRICING -->
        <div class="mb-16">
            <h2 class="flex items-center gap-3 text-4xl font-semibold mb-3">
                <span>💵</span> <span id="pricing-title"></span>
            </h2>
            <p id="pricing-note" class="text-violet-200 mb-8"></p>
            <div id="pricing-grid" class="grid md:grid-cols-2 gap-8"></div>
        </div>

        <!-- CONTACT & WORKFLOW -->
        <div class="glass rounded-3xl p-10 mb-16">
            <h2 class="flex items-center gap-3 text-4xl font-semibold mb-6">
                <span>📞</span> <span id="contact-title"></span>
            </h2>
            <ul id="contact-list" class="space-y-5 text-lg"></ul>
        </div>

        <!-- SHOWCASE -->
        <div class="mb-16">
            <h2 class="flex items-center gap-3 text-4xl font-semibold mb-8">
                <span>🎬</span> <span id="showcase-title"></span>
            </h2>
            <div id="video-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <!-- TERMS -->
        <div class="glass rounded-3xl p-10 mb-12">
            <h2 class="flex items-center gap-3 text-4xl font-semibold mb-8">
                <span>📜</span> <span id="terms-title"></span>
            </h2>
            <ul id="terms-list" class="list-disc pl-6 space-y-3 text-lg"></ul>
        </div>

        <p class="text-center text-violet-300 text-sm">Layout by PixelMan • Portfolio concept for Nerd Itadori</p>
    </main>

    <script>
        const siteData = {
            en: { /* ... your original English data (unchanged) ... */ },
            pt: { /* ... your original Portuguese data (unchanged) ... */ }
        };

        // (I kept your full data object exactly as you had it — only minor cleanup on toonforce ids)

        function renderWhatYouGet(lang) {
            const data = siteData[lang].whatYouGet;
            const card = document.getElementById('what-card');
            let itemsHTML = data.items.map(item => 
                `<li class="flex items-start gap-3"><span class="text-emerald-400 mt-1">→</span> ${item}</li>`
            ).join('');
            
            let pillsHTML = data.pills.map(pill => 
                `<span class="pill text-white text-sm font-medium px-6 py-2 rounded-3xl">${pill}</span>`
            ).join('');
           
            card.innerHTML = `
                <h2 class="text-3xl font-semibold mb-6">${data.title}</h2>
                <ul class="space-y-4 text-lg">${itemsHTML}</ul>
                <div class="flex flex-wrap gap-3 mt-10">${pillsHTML}</div>
            `;
        }

        // Rest of your JS functions remain the same (only small improvements below)
        function renderVideoCards(lang) {
            const data = siteData[lang].showcase;
            const container = document.getElementById('video-grid');
            container.innerHTML = '';
            data.videos.forEach(video => {
                const cardHTML = `
                    <div class="card video-card ${video.variant} rounded-3xl overflow-hidden group">
                        <div class="video-embed">
                            <iframe width="100%" height="100%" 
                                    src="https://www.youtube.com/embed/${video.youtubeId}" 
                                    frameborder="0" 
                                    allowfullscreen
                                    loading="lazy"
                                    title="${video.title}"></iframe>
                        </div>
                        <div class="p-6">
                            <div class="font-semibold text-xl title-font">${video.title}</div>
                            <div class="text-violet-200 mt-1">${video.desc}</div>
                        </div>
                    </div>`;
                container.innerHTML += cardHTML;
            });
        }

        // ... rest of your JS (setLanguage, renderAllContent, toggleTheme, window.onload) stays the same ...

        window.onload = () => {
            const savedLang = localStorage.getItem('preferredLang') || 'en';
            document.getElementById('language-dropdown').value = savedLang;
            renderAllContent(savedLang);
            
            if (!localStorage.getItem('preferredLang')) {
                document.getElementById('language-modal').classList.remove('hidden');
            }
            
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').textContent = '🌙';
                document.getElementById('theme-text').textContent = 'Light Mode';
            }
            
            console.log('%c✅ Nerd Itadori Animation Commissions site loaded successfully!', 'color:#a855f7; font-weight:bold');
        };
    </script>
</body>
</html>
